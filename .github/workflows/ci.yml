name: CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js 18.x
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
        cache: 'npm'
        cache-dependency-path: 'client/package-lock.json'

    - name: Install Client Dependencies
      working-directory: ./client
      run: npm ci

    - name: Install Server Dependencies
      working-directory: ./server
      run: npm ci

    - name: Run Client Linter
      working-directory: ./client
      run: npm run lint
      continue-on-error: true # Ensure build doesn't hard-fail if there are minor formatting issues

    - name: Run Client TypeScript Build Check
      working-directory: ./client
      run: npx tsc --noEmit

    # Note: If the client folder has jest configured, this will run the tests.
    - name: Run Automated Tests
      working-directory: ./client
      run: npm test -- --passWithNoTests

    - name: Next.js Build
      working-directory: ./client
      run: npm run build
      env:
        NEXT_PUBLIC_API_URL: http://localhost:5000
